<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS GRID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS GRID PROPERTIES</h1>

    <!-- DISPLAY GRID -->
    <div id="A1" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- GRID-TEMPLATE-COLUMNS -->
    <div id="A2" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- GRID-TEMPLATE-ROWS -->
    <div id="A3" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- GAP -->
    <div id="A4" class="container">
        <div>1</div><div>2</div><div>3</div><div>4</div>
    </div>

    <!-- JUSTIFY-ITEMS -->
    <div id="A5" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- ALIGN-ITEMS -->
    <div id="A6" class="container tall">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- JUSTIFY-CONTENT -->
    <div id="A7" class="container wide">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- ALIGN-CONTENT -->
    <div id="A8" class="container tall">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- GRID-COLUMN -->
    <div id="A9" class="container">
        <div class="span-col">1</div><div>2</div><div>3</div>
    </div>

    <!-- GRID-ROW -->
    <div id="A10" class="container tall">
        <div class="span-row">1</div><div>2</div><div>3</div><div>4</div>
    </div>

</body>
</html>
