<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXBOX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- DISPLAY FLEX -->
    <div id="A1" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- FLEX-DIRECTION -->
    <div id="A2" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- FLEX-WRAP -->
    <div id="A3" class="container">
        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
    </div>

    <!-- JUSTIFY-CONTENT -->
    <div id="A4" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- ALIGN-ITEMS -->
    <div id="A5" class="container tall">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- ALIGN-CONTENT -->
    <div id="A6" class="container wrap tall">
        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div>
    </div>

    <!-- GAP -->
    <div id="A7" class="container">
        <div>1</div><div>2</div><div>3</div>
    </div>

    <!-- FLEX-GROW -->
    <div id="A8" class="container">
        <div>1</div><div class="grow">2</div><div>3</div>
    </div>

    <!-- FLEX-SHRINK -->
    <div id="A9" class="container small">
        <div>1</div><div class="shrink">2</div><div>3</div>
    </div>

    <!-- ORDER -->
    <div id="A10" class="container">
        <div>1</div><div class="order">2</div><div>3</div>
    </div>

</body>
</html>
